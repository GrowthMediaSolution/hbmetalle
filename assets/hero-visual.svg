<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2ecc71" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2ecc71" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="metal1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3f47"/>
      <stop offset="100%" stop-color="#22262b"/>
    </linearGradient>
    <linearGradient id="metal2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a5058"/>
      <stop offset="100%" stop-color="#2a2f35"/>
    </linearGradient>
    <linearGradient id="green1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#1a9c54"/>
    </linearGradient>
    <filter id="shadow1">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="greenGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
    <clipPath id="truckClip">
      <rect x="60" y="140" width="480" height="340" rx="20"/>
    </clipPath>
  </defs>

  <!-- Background glow -->
  <circle cx="300" cy="300" r="280" fill="url(#glow)"/>
  <circle cx="300" cy="300" r="200" fill="none" stroke="#2ecc71" stroke-opacity="0.06" stroke-width="1"/>
  <circle cx="300" cy="300" r="260" fill="none" stroke="#2ecc71" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Main truck body -->
  <g filter="url(#shadow1)">
    <!-- Truck cab -->
    <rect x="320" y="220" width="180" height="160" rx="12" fill="url(#metal1)" stroke="#2ecc71" stroke-opacity="0.15" stroke-width="1"/>
    <!-- Cab window -->
    <rect x="340" y="240" width="100" height="60" rx="6" fill="#1a1d21" stroke="#2ecc71" stroke-opacity="0.2" stroke-width="1"/>
    <!-- Window reflection -->
    <rect x="345" y="245" width="40" height="50" rx="3" fill="#2ecc71" fill-opacity="0.05"/>

    <!-- Truck cargo area -->
    <rect x="80" y="180" width="260" height="200" rx="8" fill="url(#metal2)" stroke="#2ecc71" stroke-opacity="0.12" stroke-width="1"/>
    <!-- Cargo ridges -->
    <line x1="130" y1="180" x2="130" y2="380" stroke="#4a5058" stroke-width="2" stroke-opacity="0.5"/>
    <line x1="180" y1="180" x2="180" y2="380" stroke="#4a5058" stroke-width="2" stroke-opacity="0.5"/>
    <line x1="230" y1="180" x2="230" y2="380" stroke="#4a5058" stroke-width="2" stroke-opacity="0.5"/>
    <line x1="280" y1="180" x2="280" y2="380" stroke="#4a5058" stroke-width="2" stroke-opacity="0.5"/>

    <!-- Scrap pile in cargo -->
    <g opacity="0.7">
      <!-- Metal pipes -->
      <rect x="100" y="260" width="120" height="14" rx="7" fill="#5a6068" transform="rotate(-15 160 267)"/>
      <rect x="140" y="280" width="100" height="12" rx="6" fill="#4a5058" transform="rotate(10 190 286)"/>
      <rect x="90" y="300" width="130" height="16" rx="8" fill="#6a7078" transform="rotate(-5 155 308)"/>
      <!-- Copper coil -->
      <circle cx="250" cy="310" r="30" fill="none" stroke="#cd7f32" stroke-width="8" opacity="0.6"/>
      <circle cx="250" cy="310" r="18" fill="none" stroke="#cd7f32" stroke-width="5" opacity="0.4"/>
      <!-- Metal sheets -->
      <rect x="110" y="230" width="80" height="6" rx="2" fill="#8a9099" transform="rotate(-8 150 233)"/>
      <rect x="150" y="240" width="90" height="5" rx="2" fill="#9aa099" transform="rotate(5 195 242)"/>
    </g>
  </g>

  <!-- Wheels -->
  <g filter="url(#shadow1)">
    <circle cx="160" cy="400" r="36" fill="#22262b" stroke="#3a3f47" stroke-width="3"/>
    <circle cx="160" cy="400" r="22" fill="#2a2f35" stroke="#4a5058" stroke-width="2"/>
    <circle cx="160" cy="400" r="8" fill="#2ecc71" opacity="0.6"/>
    
    <circle cx="420" cy="400" r="36" fill="#22262b" stroke="#3a3f47" stroke-width="3"/>
    <circle cx="420" cy="400" r="22" fill="#2a2f35" stroke="#4a5058" stroke-width="2"/>
    <circle cx="420" cy="400" r="8" fill="#2ecc71" opacity="0.6"/>
  </g>

  <!-- Ground line -->
  <line x1="60" y1="436" x2="540" y2="436" stroke="#2ecc71" stroke-opacity="0.2" stroke-width="1"/>
  <ellipse cx="300" cy="440" rx="220" ry="6" fill="#2ecc71" opacity="0.05"/>

  <!-- Recycling symbol floating -->
  <g transform="translate(460, 140)" opacity="0.8">
    <circle cx="0" cy="0" r="40" fill="#0c0e10" stroke="#2ecc71" stroke-width="2" stroke-opacity="0.3"/>
    <g transform="translate(-16, -16) scale(1.35)" fill="#2ecc71" opacity="0.7">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
    </g>
  </g>

  <!-- Floating euro symbol -->
  <g transform="translate(100, 130)" opacity="0.6">
    <circle cx="0" cy="0" r="28" fill="#0c0e10" stroke="#2ecc71" stroke-width="1.5" stroke-opacity="0.25"/>
    <text x="0" y="7" text-anchor="middle" fill="#2ecc71" font-family="Arial, sans-serif" font-weight="700" font-size="24" opacity="0.7">€</text>
  </g>

  <!-- Decorative sparkles -->
  <circle cx="180" cy="160" r="3" fill="#2ecc71" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="250" r="2" fill="#2ecc71" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="520" cy="350" r="2.5" fill="#2ecc71" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- "Fair & Schnell" badge -->
  <g transform="translate(400, 480)">
    <rect x="-60" y="-16" width="120" height="32" rx="16" fill="#2ecc71" opacity="0.15" stroke="#2ecc71" stroke-opacity="0.3" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" fill="#2ecc71" font-family="Arial, sans-serif" font-weight="700" font-size="11" letter-spacing="2">FAIRE PREISE</text>
  </g>
</svg>